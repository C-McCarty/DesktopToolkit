<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Abstract</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05070f; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// Desktop Toolkit — interactive web wallpaper example (performance-conscious).
// The host forwards the (background) cursor via window.chrome.webview messages:
//   { type: "move" | "down" | "up", x: 0..1, y: 0..1 }   (normalized to this wallpaper)
// Perf notes: the backing store is CAPPED (so spanning many monitors doesn't render tens of
// megapixels per frame — CSS stretches it to fill), and the gradient backdrop is rendered ONCE
// to an offscreen canvas and blitted each frame instead of re-created.
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });

const MAX_PIXELS = 2_400_000;   // ~ a touch over 1080p; CSS upscales to the real wallpaper size
let W = 0, H = 0, bg = null;

function buildBackground() {
  bg = document.createElement('canvas');
  bg.width = W; bg.height = H;
  const b = bg.getContext('2d');
  const g = b.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a1b3a');
  g.addColorStop(0.55, '#0b2a5e');
  g.addColorStop(1, '#06122c');
  b.fillStyle = g; b.fillRect(0, 0, W, H);
}

function resize() {
  const cssW = innerWidth, cssH = innerHeight;
  const scale = cssW * cssH > MAX_PIXELS ? Math.sqrt(MAX_PIXELS / (cssW * cssH)) : 1;
  W = canvas.width = Math.max(1, Math.round(cssW * scale));
  H = canvas.height = Math.max(1, Math.round(cssH * scale));
  buildBackground();
}
addEventListener('resize', resize); resize();

const pointer = { x: 0.5, y: 0.5, down: false };
const ripples = [];     // {x,y,r,life,strong}
const particles = [];   // {x,y,vx,vy,life,max,hue}
const MAX_PARTICLES = 380;

function spawnRipple(x, y, strong) { ripples.push({ x: x * W, y: y * H, r: 6, life: 1, strong }); }
function spawnParticles(x, y, n, speed, hue) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random());
    particles.push({ x: x * W, y: y * H, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
                     life: 1, max: 36 + Math.random() * 36, hue: hue + (Math.random() * 30 - 15) });
  }
  while (particles.length > MAX_PARTICLES) particles.shift();
}

if (window.chrome && chrome.webview) {
  chrome.webview.addEventListener('message', e => {
    const m = e.data;
    if (!m || typeof m.x !== 'number') return;
    if (m.type === 'move') {
      pointer.x = m.x; pointer.y = m.y;
      spawnParticles(m.x, m.y, pointer.down ? 3 : 1, pointer.down ? 2.2 : 1.0, pointer.down ? 195 : 205);
    } else if (m.type === 'down') {
      pointer.down = true; pointer.x = m.x; pointer.y = m.y;
      spawnRipple(m.x, m.y, true); spawnParticles(m.x, m.y, 28, 3.0, 190);
    } else if (m.type === 'up') {
      pointer.down = false;
    }
  });
}

let t = 0;
function frame() {
  t += 0.006;
  const ox = (pointer.x - 0.5) * 40, oy = (pointer.y - 0.5) * 40;

  // Cached gradient backdrop (one blit, no per-frame gradient allocation).
  ctx.drawImage(bg, 0, 0);

  // Rolling wave bands (cheap strokes) with a gentle parallax.
  ctx.globalCompositeOperation = 'lighter';
  for (let bnd = 0; bnd < 3; bnd++) {
    ctx.beginPath();
    const yBase = H * (0.5 + bnd * 0.15) + oy * (0.4 + bnd * 0.2);
    for (let x = 0; x <= W; x += 22) {
      const y = yBase + Math.sin(x * 0.006 + t * (1 + bnd * 0.4) + bnd) * (10 + bnd * 6);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(90,150,255,${0.06 + bnd * 0.02})`;
    ctx.lineWidth = 2; ctx.stroke();
  }

  // Small spotlight localized around the cursor (not a full-canvas fill).
  const sx = pointer.x * W + ox, sy = pointer.y * H + oy, R = Math.min(W, H) * 0.18;
  const sl = ctx.createRadialGradient(sx, sy, 0, sx, sy, R);
  sl.addColorStop(0, 'rgba(120,190,255,0.20)');
  sl.addColorStop(1, 'rgba(120,190,255,0)');
  ctx.fillStyle = sl; ctx.fillRect(sx - R, sy - R, R * 2, R * 2);

  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i]; r.r += r.strong ? 7 : 4; r.life -= 0.012;
    if (r.life <= 0) { ripples.splice(i, 1); continue; }
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(150,210,255,${r.life * 0.6})`;
    ctx.lineWidth = r.strong ? 3 : 1.5; ctx.stroke();
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.vy += 0.02;
    p.life -= 1 / p.max;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},90%,70%,${p.life * 0.8})`;
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
